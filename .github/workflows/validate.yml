name: Validate Documentation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check required files exist
      run: |
        echo "=== Checking required files ==="
        [[ -f README.md ]] && echo "✓ README.md exists"
        [[ -f docs/prerequisites.md ]] && echo "✓ docs/prerequisites.md exists"
        [[ -f docs/hardware-validation.md ]] && echo "✓ docs/hardware-validation.md exists"
        [[ -f docs/efi-configuration.md ]] && echo "✓ docs/efi-configuration.md exists"
        [[ -f docs/macos-installation.md ]] && echo "✓ docs/macos-installation.md exists"
        [[ -f docs/troubleshooting.md ]] && echo "✓ docs/troubleshooting.md exists"
        echo "=== All required docs present ==="

    - name: Count documentation lines
      run: |
        echo "Documentation line counts:"
        wc -l docs/*.md | tail -1

    - name: List scripts
      run: |
        echo "=== Scripts ==="
        echo "Linux: $(ls scripts/*.sh 2>/dev/null | wc -l)"
        echo "Windows: $(ls scripts/windows/*.bat 2>/dev/null | wc -l)"
        echo "PowerShell: $(ls scripts/windows/*.ps1 2>/dev/null | wc -l)"